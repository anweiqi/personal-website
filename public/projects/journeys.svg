<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <g transform="translate(240, 110)">
    <!-- Pinterest Pin icon -->
    <circle cx="40" cy="40" r="36" fill="#E60023"/>
    <text x="40" y="56" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle">P</text>
    <!-- Journeys text -->
    <text x="100" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#1e293b" text-anchor="start">Journeys</text>
  </g>
</svg>
